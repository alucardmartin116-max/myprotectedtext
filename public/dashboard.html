<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-5">

<h1 class="text-2xl mb-4">📝 Secure Notes</h1>

<div class="flex gap-2 mb-3">
<button onclick="addTab()" class="bg-green-600 px-3 py-2 rounded">+Tab</button>
<button onclick="save()" class="bg-blue-600 px-3 py-2 rounded">Save</button>
<button onclick="logout()" class="bg-red-600 px-3 py-2 rounded ml-auto">Logout</button>
<button onclick="clearAllTabs()"class="bg-red-600 px-3 py-2 rounded ml-auto">Clear All</button>
</div>

<div id="tabs" class="flex gap-2 mb-3"></div>

<div class="flex gap-5">
<textarea id="note" class="flex-1 h-[75vh] p-4 rounded bg-gray-800"></textarea>

<div class="w-64 bg-gray-800 p-4 rounded h-fit">
<h3 class="mb-3">🔐 Password</h3>

<input id="oldPass" type="password" placeholder="Old" class="w-full mb-2 p-2 bg-gray-700 rounded">
<input id="newPass" type="password" placeholder="New" class="w-full mb-2 p-2 bg-gray-700 rounded">

<button onclick="changePassword()" class="w-full bg-yellow-600 p-2 rounded">
Update
</button>
</div>
</div>

<script src="main.js"></script>
</body>
</html>
