<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-gray-800 p-6 rounded w-80 text-white">

<h2 class="text-xl mb-4 text-center">🔐 Login</h2>

<input id="username" placeholder="Username" class="w-full mb-2 p-2 bg-gray-700 rounded">
<input id="password" type="password" placeholder="Password" class="w-full mb-3 p-2 bg-gray-700 rounded">

<button onclick="login()" class="w-full bg-blue-600 p-2 rounded mb-2">Login</button>
<button onclick="register()" class="w-full bg-green-600 p-2 rounded">Register</button>
</div>

<script src="main.js"></script>
</body>
</html>
